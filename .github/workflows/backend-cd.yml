name: Backend CD

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'backend/**'
  # 테스트를 위한 수동 실행 가능
  workflow_dispatch:

defaults:
  run:
    working-directory: ./backend

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      # CI에서 이미 검증되었다고 가정 -x test로 스킵하여 배포 속도를 높임
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Deploy to EC2
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          # 전체 내용을 환경 변수로 안전하게 담음
          RAW_ENV_FILE: ${{ secrets.ENV_FILE }}
          SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE }}
        run: |
          set -e
          
          # 1. SSH 설정
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' | ssh-add -
          ssh-keyscan -H -p ${{ secrets.EC2_PORT }} ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

          # 2. .env 파일 생성
          printf '%s\n' "$RAW_ENV_FILE" | sed 's/\r$//' > .env
          printf 'SPRING_PROFILES_ACTIVE=%s\n' "${SPRING_PROFILES_ACTIVE}" >> .env

          awk '
            /^[[:space:]]*$/ { next }
            /^[[:space:]]*#/ { next }
            { print "export " $0 }
          ' .env > env.sh

          # 4. 파일 전송 (env.sh도 함께 전송)
          scp -P ${{ secrets.EC2_PORT }} .env env.sh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ secrets.DEPLOY_DIR }}/
          scp -P ${{ secrets.EC2_PORT }} ./build/libs/app.jar ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ secrets.DEPLOY_DIR }}/app.jar

          # 5. 실행
          ssh -p ${{ secrets.EC2_PORT }} ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "chmod +x ${{ secrets.DEPLOY_DIR }}/deploy.sh && ${{ secrets.DEPLOY_DIR }}/deploy.sh"