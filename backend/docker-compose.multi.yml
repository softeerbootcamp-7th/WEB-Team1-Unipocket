services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-1
      - app-2
    networks:
      - perf-network

  app-1: &app-base
    build:
      context: .
      dockerfile: Dockerfile
    image: backend-app:1.0
    environment:
      - SPRING_PROFILES_ACTIVE=local-test
      - REDIS_HOST=redis
      - LLM_API_URL=http://wiremock:8080
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-dummy-bucket}
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT:-http://localstack:4566}
      - JAVA_OPTS=-XX:MaxRAMPercentage=75.0 -XX:MinRAMPercentage=50.0 -XX:+UseG1GC
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      wiremock:
        condition: service_started
    networks:
      - perf-network

  app-2:
    <<: *app-base

  mysql:
    image: mysql:8.4.8
    container_name: mysql_unipocket_multi
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root1234
      - MYSQL_DATABASE=unipocket
    networks:
      - perf-network
    volumes:
      - ./mysql_data_multi:/var/lib/mysql
      - ./sql/seed/exchange_rate.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:alpine
    networks:
      - perf-network

  localstack:
    image: localstack/localstack
    ports:
      - "4567:4566"
    environment:
      - SERVICES=s3,sqs
      - AWS_DEFAULT_REGION=${AWS_REGION:-ap-northeast-2}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:4566/_localstack/health >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - perf-network

  localstack-init:
    image: amazon/aws-cli:2.22.13
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_REGION:-ap-northeast-2}
      - AWS_ENDPOINT_URL=${AWS_S3_ENDPOINT:-http://localstack:4566}
      - S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-dummy-bucket}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        until aws --endpoint-url="$${AWS_ENDPOINT_URL}" s3api list-buckets >/dev/null 2>&1; do
          echo "waiting for localstack..."
          sleep 1
        done
        if aws --endpoint-url="$${AWS_ENDPOINT_URL}" s3api head-bucket --bucket "$${S3_BUCKET_NAME}" >/dev/null 2>&1; then
          echo "bucket already exists: $${S3_BUCKET_NAME}"
        else
          aws --endpoint-url="$${AWS_ENDPOINT_URL}" s3api create-bucket --bucket "$${S3_BUCKET_NAME}" --create-bucket-configuration LocationConstraint="$${AWS_DEFAULT_REGION}"
          echo "bucket created: $${S3_BUCKET_NAME}"
        fi
    networks:
      - perf-network

  wiremock:
    image: wiremock/wiremock:latest
    ports:
      - "8081:8080"
    command: ["--global-response-templating", "--async-response-enabled=true"]
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
    networks:
      - perf-network

networks:
  perf-network:
    driver: bridge
